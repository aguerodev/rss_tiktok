# .github/workflows/flat.yml
name: Generate TikTok RSS Feeds

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Cada 4 horas, minuto 10
    - cron: '10 */4 * * *'

jobs:
  rss_generator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv CLI
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Create virtual env & sync dependencies
        run: |
          uv venv            # crea .venv
          uv sync            # instala según uv.lock
          uv run python -m playwright install chromium

      - name: Generate RSS feeds
        env:
          MS_TOKEN: ${{ secrets.MS_TOKEN }}  # define tu token en Settings > Secrets
        run: |
          uv run python tiktok_rss.py

      - name: Commit and push feeds
        run: |
          git config --global user.name  "github-actions"
          git config --global user.email "actions@github.com"
          git add rss/ uv.lock
          git commit --allow-empty -m "chore: update RSS feeds"
          git push
